# GitHub Pages Configuration for SweetMeSoft KMP Library Documentation

title: SweetMeSoft KMP Library
description: >-
  A complete multiplatform library for Kotlin that provides advanced UI components,
  maps integration and essential utilities for developing native applications
  on Android, iOS and Desktop.
baseurl: "/KmpLibrary"
url: "https://sweetmesoft.github.io"
repository: SweetMeSoft/KmpLibrary

# Theme Settings
theme: jekyll-theme-primer
remote_theme: just-the-docs/just-the-docs

# Color Scheme & Customization
color_scheme: dark # default is light, dark mode is premium and stylized
search_enabled: true
search:
  tokenizer: 'default'
  heading_level: 4

# Header / Logo
logo: "/assets/images/logo.png"

# Markdown processor
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Navigation & Layout Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Exclusions
exclude:
  - .gradle/
  - build/
  - gradle/
  - gradlew
  - gradlew.bat
  - settings.gradle.kts
  - "*.iml"
  - .idea/
  - local.properties
  - secret_key.gpg
  - Gemfile
  - Gemfile.lock

# Social & Author Variables
github_username: erickvelasco11
author:
  name: SweetMeSoft Team
  email: team@sweetmesoft.com

# Project Versions
version: "2.2.1"
kotlin_version: "2.4.10"
compose_version: "1.11.1"

# SEO Settings
lang: en
seo:
  name: SweetMeSoft KMP Library
  type: WebSite